name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Tests and Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Install test and security tools
        run: python -m pip install ruff pytest pip-audit

      - name: Lint with Ruff
        run: python -m ruff check app

      - name: Run unit and integration tests
        run: python -m pytest -q

      - name: Dependency audit
        run: python -m pip_audit || true

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Tests, Build and Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        # --include=dev ensures devDependencies (vitest, vite) are installed.
        # Do NOT use `npm config set production false` — deprecated in npm 9+.
        run: npm ci --include=dev

      - name: Verify key tools are present
        run: |
          node --version
          npm --version
          npm exec -- vitest --version || true

      - name: Run frontend unit tests
        run: npm exec -- vitest run

      - name: Build frontend
        run: npm run build

      - name: Dependency audit
        run: npm audit --omit=dev || true

  # ── CodeQL ─────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
