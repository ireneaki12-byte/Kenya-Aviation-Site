name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend - Lint, Tests and Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Install backend test and security tools
        run: python -m pip install ruff pytest pip-audit

      - name: Lint backend with Ruff
        run: python -m ruff check app

      - name: Run backend unit and integration tests
        run: python -m pytest -q

      - name: Backend dependency audit
        run: python -m pip_audit || true

  frontend:
    name: Frontend - Unit Tests, Build and Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NODE_ENV: development
      NPM_CONFIG_PRODUCTION: "false"
      NPM_CONFIG_BIN_LINKS: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm config set production false
          npm config set bin-links true
          npm ci --include=dev

      - name: Verify frontend dependencies
        run: |
          node --version
          npm --version
          npm config get production
          npm config get bin-links
          npm list vitest
          ls -la node_modules/vitest || true
          ls -la node_modules/.bin || true

      - name: Run frontend component/unit tests
        run: node ./node_modules/vitest/vitest.mjs run

      - name: Build frontend
        run: npm run build

      - name: Frontend dependency audit
        run: npm audit --omit=dev || true

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3